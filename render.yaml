services:
  # -------------------------------------------------------------
  # 1. BACKEND DOCKER SERVICE (Express + Mongoose + Socket.io)
  # -------------------------------------------------------------
  - type: web
    name: school-mgmt-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: backend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # MongoDB Atlas URI: mongodb+srv://user:pass@cluster.mongodb.net/school_mgmt
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false # Render Frontend URL: https://school-mgmt-frontend.onrender.com
      - key: RESEND_API_KEY
        sync: false # Get free API Key at https://resend.com
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # -------------------------------------------------------------
  # 2. FRONTEND STATIC SITE (React + Vite SPA)
  # -------------------------------------------------------------
  - type: web
    name: school-mgmt-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA Rewrite Rule for React Router (prevents 404 on refresh)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Render Backend URL: https://school-mgmt-backend.onrender.com
