services:
  mongodb:
    image: mongo:latest
    container_name: sms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_backend
    command: npm run dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/school_mgmt
      - JWT_SECRET=supersecretjwtkey12345!
      - CLIENT_URL=http://localhost:5173
      - EMAIL_HOST=smtp.ethereal.email
      - EMAIL_PORT=587
      - EMAIL_USER=ceasar.auer@ethereal.email
      - EMAIL_PASS=K6r1TS4kJdu25HvAn8
      - EMAIL_FROM=ceasar.auer@ethereal.email
      - FIREBASE_PROJECT_ID=school-mgmt-13917
    depends_on:
      - mongodb
    networks:
      - sms_network

  frontend:
    # Use node image directly for local hot-reload development (no build/Nginx needed)
    image: node:20-alpine
    container_name: sms_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Use backend service name for container-to-container communication
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - sms_network

volumes:
  mongodb_data:

networks:
  sms_network:
    driver: bridge
